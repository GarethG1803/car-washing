name: clean_ride
description: CleanRide - Home Service Car Wash ERP App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  intl: ^0.19.0
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  table_calendar: ^3.1.0
  percent_indicator: ^4.2.0
  gap: ^3.0.0
  heroicons: ^0.11.0
  dio: ^5.9.2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^2.5.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
